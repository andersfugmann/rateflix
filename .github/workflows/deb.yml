name: Debian package

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-deb:
    name: Build .deb package
    runs-on: ubuntu-latest
    container:
      image: debian:unstable
    steps:
      - name: Install build tools
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git curl ca-certificates build-essential \
            debhelper devscripts fakeroot \
            opam pkg-config libgmp-dev libev-dev libffi-dev \
            imagemagick librsvg2-bin

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Set up OCaml
        run: |
          opam init --bare --yes --disable-sandboxing
          opam switch create 5.4.0 --yes
          eval $(opam env)
          opam install . --deps-only --with-test --yes

      - name: Build server binary
        run: |
          eval $(opam env)
          dune build --profile=release server/rateflix_server.exe
          cp _build/default/server/rateflix_server.exe rateflix-server

      - name: Build Debian package
        run: |
          dpkg-buildpackage -us -uc -b

      - name: Build plugin bundle
        run: |
          eval $(opam env)
          dune build --profile=release @plugin
          cp -a _build/default/plugin_build rateflix-plugin

      - name: Archive plugin
        id: plugin
        shell: bash
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          ARCHIVE_NAME="rateflix-plugin-${SHORT_SHA}.tar.gz"
          tar -czf "$ARCHIVE_NAME" rateflix-plugin
          echo "archive_name=$ARCHIVE_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: rateflix-server-deb
          path: ../rateflix-server_*.deb

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: rateflix-plugin
          path: ${{ steps.plugin.outputs.archive_name }}
