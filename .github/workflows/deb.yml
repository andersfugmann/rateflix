name: Debian package

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-deb:
    name: Build .deb package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: debian:unstable
    steps:
      - name: Install build tools
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git curl ca-certificates build-essential \
            debhelper devscripts fakeroot \
            opam pkg-config libgmp-dev libev-dev libffi-dev \
            imagemagick librsvg2-bin

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Set up OCaml
        run: |
          opam init --bare --yes --disable-sandboxing
          opam switch create 5.4.0 --yes
          eval $(opam env)
          opam install . --deps-only --with-test --yes

      - name: Build server binary
        run: |
          eval $(opam env)
          dune build --profile=release server/rateflix_server.exe

      - name: Build Debian package
        run: |
          eval $(opam env)
          dpkg-buildpackage -us -uc -b
          cp ../rateflix-server_*.deb .

      - name: Build plugin bundle
        run: |
          eval $(opam env)
          dune build --profile=release @plugin
          cp -a _build/default/plugin_build rateflix-plugin

      - name: Archive plugin
        id: package
        shell: bash
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          VERSION=$(dpkg-parsechangelog -S Version)
          PLUGIN_ARCHIVE="rateflix-plugin-${VERSION}.tar.gz"
          tar -czf "$PLUGIN_ARCHIVE" rateflix-plugin
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "plugin_archive=$PLUGIN_ARCHIVE" >> "$GITHUB_OUTPUT"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: rateflix-server-deb
          path: rateflix-server_*.deb

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: rateflix-plugin
          path: ${{ steps.package.outputs.plugin_archive }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.package.outputs.version }}
          name: Rateflix ${{ steps.package.outputs.version }}
          body: |
            Automated release for commit ${{ github.sha }}.

            **Debian package** (unstable): install with `sudo dpkg -i rateflix-server_${{ steps.package.outputs.version }}_amd64.deb`
            **Browser plugin**: extract the tarball and load in Chrome via `chrome://extensions` with Developer mode enabled.
          files: |
            rateflix-server_*.deb
            ${{ steps.package.outputs.plugin_archive }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
