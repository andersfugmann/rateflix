# Example nginx reverse proxy for rateflix-server
#
# This provides HTTPS termination so the browser plugin can connect
# to a remote rateflix-server without mixed content issues.
#
# To enable:
#   1. Copy this file to /etc/nginx/sites-available/rateflix
#   2. Edit server_name and ssl_certificate paths
#   3. Symlink to /etc/nginx/sites-enabled/
#   4. Reload nginx: systemctl reload nginx
#
# The plugin should then be configured with: https://rateflix.example.com

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name rateflix.example.com;

    ssl_certificate     /etc/letsencrypt/live/rateflix.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rateflix.example.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:1913;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
